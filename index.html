<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLMath</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a, #1c0000);
            color: #f0f0f0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        .glow-red {
            text-shadow: 0 0 40px rgba(255, 45, 85, 0.7), 0 0 80px rgba(255, 45, 85, 0.4);
        }
        .card {
            background: rgba(12, 12, 12, 0.75);
            border: 1px solid rgba(255, 45, 85, 0.18);
            border-radius: 2rem;
            backdrop-filter: blur(16px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: #ff2d55;
            box-shadow: 0 30px 60px -15px rgba(255, 45, 85, 0.35);
        }
        .input-focus {
            transition: all 0.4s ease;
        }
        .input-focus:focus {
            border-color: #ff2d55;
            box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.25);
            transform: scale(1.015);
        }
        .rank-icon {
            width: 90px;
            height: 90px;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6));
            transition: transform 0.4s ease;
        }
        .rank-card:hover .rank-icon {
            transform: scale(1.12) rotate(3deg);
        }
        .pulse-glow {
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- SEARCH / LANDING PAGE -->
    <div id="searchPage" class="flex-1 flex flex-col items-center justify-center px-6 py-12">
        <div class="text-center mb-16 pulse-glow">
            <h1 class="text-8xl md:text-9xl font-black tracking-tighter glow-red">
                RLMath
            </h1>
            <p class="mt-4 text-xl md:text-2xl text-zinc-400 font-light">
                Rocket League stats • fast & clean
            </p>
        </div>

        <div class="w-full max-w-2xl card p-10 md:p-14 shadow-2xl">
            <input 
                id="playerInput" 
                type="text" 
                placeholder="Enter Epic Account ID (32 hex characters)"
                class="w-full bg-black/60 border-2 border-zinc-700 rounded-3xl px-8 py-7 text-2xl placeholder-zinc-500 outline-none input-focus text-center font-mono"
            >
            <button 
                onclick="searchPlayer()" 
                id="fetchBtn"
                class="mt-10 w-full bg-gradient-to-r from-red-600 via-rose-600 to-red-600 hover:from-red-700 hover:via-rose-700 hover:to-red-700 py-7 rounded-3xl text-2xl font-bold flex items-center justify-center gap-4 transition-all active:scale-95 shadow-2xl"
            >
                <i class="fa-solid fa-rocket"></i>
                LOAD PROFILE
            </button>
        </div>

        <div class="mt-12 text-sm text-zinc-600 text-center">
            Use a 32-character Epic Account ID • Find yours on rocketleague.tracker.network
        </div>
    </div>

    <!-- PLAYER PROFILE PAGE -->
    <div id="playerPage" class="hidden">
        <div class="max-w-6xl mx-auto px-6 pt-10 pb-16">
            <button 
                onclick="showSearchPage()" 
                class="mb-12 flex items-center gap-4 text-zinc-400 hover:text-white text-xl transition hover:scale-105"
            >
                <i class="fa-solid fa-arrow-left-long"></i>
                Back
            </button>

            <div id="playerHeader" class="card p-10 md:p-14 mb-16 flex flex-col md:flex-row items-center gap-10 animate-fade-in"></div>

            <h2 class="text-5xl font-black mb-10 text-center md:text-left glow-red">
                Current Ranks
            </h2>

            <div id="ranksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>

            <details class="mt-20 card p-10 text-sm">
                <summary class="cursor-pointer flex items-center gap-4 text-red-400 font-medium text-lg">
                    <i class="fa-solid fa-code"></i>
                    Raw JSON Response
                </summary>
                <pre id="rawJson" class="mt-8 bg-black/70 p-8 rounded-2xl overflow-auto max-h-96 text-gray-300 font-mono text-xs whitespace-pre-wrap"></pre>
            </details>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="w-24 h-24 border-8 border-red-600 border-t-transparent rounded-full animate-spin mx-auto mb-8"></div>
            <p class="text-3xl font-bold text-red-400">Loading stats...</p>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50 px-6">
        <div class="card max-w-lg w-full p-12 text-center">
            <i class="fa-solid fa-triangle-exclamation text-7xl text-red-500 mb-8"></i>
            <p id="errorText" class="text-2xl leading-relaxed mb-10"></p>
            <button onclick="hideError()" class="w-full py-6 bg-zinc-900 hover:bg-zinc-800 rounded-3xl text-xl font-medium transition">
                CLOSE
            </button>
        </div>
    </div>

    <script>
        const API_KEY = "33990be289mshc6f00878fdf6e7dp1b1374jsn04f139efbd1d";

        function showSearchPage() {
            document.getElementById('playerPage').classList.add('hidden');
            document.getElementById('searchPage').classList.remove('hidden');
        }

        function showPlayerPage() {
            document.getElementById('searchPage').classList.add('hidden');
            document.getElementById('playerPage').classList.remove('hidden');
        }

        function showLoading() { document.getElementById('loading').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

        function showError(msg) {
            document.getElementById('errorText').innerHTML = msg;
            document.getElementById('errorModal').classList.remove('hidden');
            hideLoading();
        }
        function hideError() { document.getElementById('errorModal').classList.add('hidden'); }

        async function searchPlayer() {
            let id = document.getElementById('playerInput').value.trim().replace(/\s/g, '');
            if (!id) return alert("Please enter an Epic Account ID");

            if (!/^[0-9a-fA-F]{32}$/.test(id)) {
                showError("Invalid format.<br>Must be exactly 32 hexadecimal characters (no spaces).");
                return;
            }

            showLoading();

            const url = `https://rocket-league1.p.rapidapi.com/ranks/${id}`;

            try {
                const res = await fetch(url, {
                    headers: {
                        'X-RapidAPI-Key': API_KEY,
                        'X-RapidAPI-Host': 'rocket-league1.p.rapidapi.com',
                        'Accept-Encoding': 'identity',
                        'x-rapidapi-ua': 'RapidAPI-Playground'
                    }
                });

                if (!res.ok) {
                    if (res.status === 404) showError("Player not found.<br>Check the Epic ID.");
                    else if (res.status === 429) showError("Rate limit reached.<br>Try again in a few minutes.");
                    else showError(`Error ${res.status}`);
                    return;
                }

                const data = await res.json();
                window.currentData = data;

                renderProfile(data, id);
                showPlayerPage();
            } catch (err) {
                showError("Failed to connect.<br>Try again later.");
            } finally {
                hideLoading();
            }
        }

        function renderProfile(data, id) {
            const header = document.getElementById('playerHeader');
            const grid = document.getElementById('ranksGrid');
            const raw = document.getElementById('rawJson');

            raw.textContent = JSON.stringify(data, null, 2);

            let name = data.name || data.displayName || data.username || "Player";
            if (name.length > 24) name = name.slice(0, 21) + "...";

            header.innerHTML = `
                <div class="w-32 h-32 bg-gradient-to-br from-red-600 to-rose-800 rounded-3xl flex items-center justify-center text-8xl shadow-2xl">
                    🚀
                </div>
                <div class="text-center md:text-left">
                    <div class="text-6xl md:text-7xl font-black tracking-tight glow-red">${name}</div>
                    <div class="mt-4 flex items-center gap-4 justify-center md:justify-start">
                        <span class="px-6 py-2 bg-red-950/60 text-red-300 font-mono rounded-2xl text-sm">EPIC ID</span>
                        <span class="text-zinc-500 font-mono text-sm break-all">${id}</span>
                    </div>
                </div>
            `;

            grid.innerHTML = '';

            let playlists = {};
            if (data && typeof data === 'object') {
                Object.keys(data).forEach(k => {
                    const v = data[k];
                    if (v && typeof v === 'object' && (v.mmr || v.rank || v.tier)) {
                        playlists[k] = v;
                    }
                });
                if (Object.keys(playlists).length === 0 && data.ranks) playlists = data.ranks;
            }

            if (Object.keys(playlists).length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-zinc-500 text-2xl">No rank data available</div>`;
                return;
            }

            const icons = {
                "bronze": "https://static.wikia.nocookie.net/rocketleague/images/6/6c/Bronze1_rank_icon.png",
                "silver": "https://static.wikia.nocookie.net/rocketleague/images/2/2f/Silver1_rank_icon.png",
                "gold": "https://static.wikia.nocookie.net/rocketleague/images/0/0e/Gold1_rank_icon.png",
                "platinum": "https://static.wikia.nocookie.net/rocketleague/images/4/4d/Platinum1_rank_icon.png",
                "diamond": "https://static.wikia.nocookie.net/rocketleague/images/9/9b/Diamond1_rank_icon.png",
                "champion": "https://static.wikia.nocookie.net/rocketleague/images/5/5e/Champion1_rank_icon.png",
                "grand champion": "https://static.wikia.nocookie.net/rocketleague/images/0/0d/GrandChampion1_rank_icon.png",
                "supersonic legend": "https://static.wikia.nocookie.net/rocketleague/images/0/0a/SupersonicLegend_rank_icon.png",
                "unranked": "https://via.placeholder.com/90x90/222/aaa?text=?"
            };

            Object.entries(playlists).forEach(([key, stats]) => {
                const title = key
                    .replace(/([A-Z])/g, ' $1')
                    .replace(/^./, s => s.toUpperCase())
                    .replace('Duel', '1v1')
                    .replace('Doubles', '2v2')
                    .replace('Standard', '3v3');

                let rank = (stats.rank || stats.tier_name || stats.tier || 'Unranked').toLowerCase();
                let div = stats.division !== undefined ? `Div ${stats.division}` : '';
                let mmr = stats.mmr || stats.skill || stats.rating || '—';
                let games = stats.matchesPlayed || stats.games || '—';
                let streak = stats.winStreak || stats.streak || '—';

                let icon = icons.unranked;
                for (let k in icons) {
                    if (rank.includes(k)) {
                        icon = icons[k];
                        break;
                    }
                }

                const card = `
                    <div class="rank-card card p-10">
                        <div class="flex flex-col md:flex-row items-center md:items-start gap-8">
                            <img src="${icon}" alt="${rank}" class="rank-icon">
                            <div class="flex-1 text-center md:text-left">
                                <div class="text-red-400 uppercase tracking-widest text-sm mb-2">${title}</div>
                                <div class="text-4xl md:text-5xl font-black">${rank.charAt(0).toUpperCase() + rank.slice(1)}</div>
                                ${div ? `<div class="text-red-300 text-2xl mt-2">${div}</div>` : ''}
                            </div>
                            <div class="text-center md:text-right mt-6 md:mt-0">
                                <div class="text-6xl md:text-7xl font-mono font-black text-red-500">${mmr}</div>
                                <div class="text-sm text-zinc-500 tracking-wider">MMR</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-6 mt-10">
                            <div class="bg-black/50 rounded-2xl p-6 text-center">
                                <div class="text-zinc-400 text-sm mb-2">GAMES</div>
                                <div class="text-4xl font-mono">${games}</div>
                            </div>
                            <div class="bg-black/50 rounded-2xl p-6 text-center">
                                <div class="text-zinc-400 text-sm mb-2">STREAK</div>
                                <div class="text-4xl font-mono flex justify-center items-center gap-3">
                                    ${streak} ${streak > 0 ? '<span class="text-green-400">🔥</span>' : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        document.getElementById('playerInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchPlayer();
        });
    </script>
</body>
</html>
