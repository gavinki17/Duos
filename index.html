<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLMath</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a1f14, #001a2e);
            color: #e0f7fa;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        .glow-gone { text-shadow: none; }
        .main-card {
            background: rgba(10, 25, 30, 0.78);
            border: 1px solid rgba(34, 197, 94, 0.22);
            border-radius: 1.75rem;
            backdrop-filter: blur(14px);
        }
        .rank-card {
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid transparent;
        }
        .rank-card:hover {
            transform: translateY(-10px) scale(1.015);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.55);
        }
        .rank-icon {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.65));
            transition: transform 0.35s ease;
        }
        .rank-card:hover .rank-icon { transform: scale(1.12); }
        .input-focus {
            transition: all 0.35s ease;
        }
        .input-focus:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.22);
            transform: scale(1.01);
        }
        .pulse-glow {
            animation: pulse 5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.93; }
            50% { opacity: 1; }
        }

        /* Updated rank themes — green/blue spectrum */
        .rank-bronze    { background: linear-gradient(135deg, #2c1a0f, #4a2e16); border-color: #92400e; }
        .rank-silver    { background: linear-gradient(135deg, #374151, #6b7280); border-color: #9ca3af; }
        .rank-gold      { background: linear-gradient(135deg, #4a2c00, #8b6f00); border-color: #fbbf24; }
        .rank-platinum  { background: linear-gradient(135deg, #1e293b, #475569); border-color: #94a3b8; }
        .rank-diamond   { background: linear-gradient(135deg, #0f766e, #14b8a6); border-color: #2dd4bf; }
        .rank-champion  { background: linear-gradient(135deg, #065f46, #10b981); border-color: #34d399; }
        .rank-grand     { background: linear-gradient(135deg, #064e3b, #059669); border-color: #10b981; }
        .rank-legend    { background: linear-gradient(135deg, #022c22, #0f766e); border-color: #14b8a6; box-shadow: 0 0 36px rgba(16,185,129,0.16); }
        .rank-default   { background: linear-gradient(135deg, #0f172a, #1e293b); border-color: #4b5563; }

        .teal-btn {
            background: linear-gradient(to right, #0ea5e9, #10b981, #34d399);
        }
        .teal-btn:hover {
            background: linear-gradient(to right, #059669, #0ea5e9, #10b981);
        }
    </style>
</head>
<body class="flex flex-col">
    <div id="searchPage" class="flex-1 flex flex-col items-center justify-center px-5 py-10">
        <div class="text-center mb-12 pulse-glow">
            <h1 class="text-7xl md:text-8xl font-black tracking-tighter bg-gradient-to-r from-teal-400 via-cyan-400 to-emerald-500 bg-clip-text text-transparent glow-gone">
                RLMath
            </h1>
            <p class="mt-3 text-lg md:text-xl text-teal-200/80 font-light">
                Rocket League stats delivered fast and clean.
            </p>
        </div>
        <div class="w-full max-w-xl main-card p-8 md:p-10 shadow-xl">
            <input
                id="playerInput"
                type="text"
                placeholder="Enter Epic Account ID (32 hex characters)"
                class="w-full bg-black/55 border-2 border-teal-900/50 rounded-3xl px-6 py-5 text-xl placeholder-teal-400/60 outline-none input-focus text-center font-mono text-teal-50"
            >
            <button
                onclick="searchPlayer()"
                class="mt-8 w-full teal-btn hover:brightness-110 py-6 rounded-3xl text-xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl"
            >
                <i class="fa-solid fa-rocket"></i>
                LOAD PROFILE
            </button>
        </div>
        <div class="mt-10 text-sm text-teal-300/60 text-center">
            Use a 32-character Epic Account ID.
        </div>
    </div>

    <div id="playerPage" class="hidden">
        <div class="max-w-5xl mx-auto px-5 pt-8 pb-14">
            <button
                onclick="showSearchPage()"
                class="mb-10 flex items-center gap-3 text-teal-300 hover:text-white text-lg transition hover:scale-105"
            >
                <i class="fa-solid fa-arrow-left-long"></i>
                Back
            </button>
            <div id="playerHeader" class="main-card p-8 md:p-10 mb-14 flex flex-col md:flex-row items-center gap-8"></div>
           
            <h2 class="text-4xl md:text-5xl font-black mb-8 text-center md:text-left bg-gradient-to-r from-teal-400 to-cyan-400 bg-clip-text text-transparent">
                Current Ranks
            </h2>
            <div id="ranksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

            <h2 class="text-4xl md:text-5xl font-black mt-16 mb-8 text-center md:text-left bg-gradient-to-r from-teal-400 to-cyan-400 bg-clip-text text-transparent">
                Career Stats (All-Time)
            </h2>
            <div id="statsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

            <details class="mt-16 main-card p-8 text-sm">
                <summary class="cursor-pointer flex items-center gap-3 text-teal-300 font-medium text-lg">
                    <i class="fa-solid fa-code"></i>
                    Raw JSON Response
                </summary>
                <pre id="rawJson" class="mt-6 bg-black/65 p-6 rounded-xl overflow-auto max-h-96 text-gray-200 font-mono text-xs whitespace-pre-wrap"></pre>
            </details>
        </div>
    </div>

    <div id="loading" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="w-20 h-20 border-8 border-teal-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-2xl font-bold text-teal-400">Loading stats...</p>
        </div>
    </div>

    <div id="errorModal" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50 px-5">
        <div class="main-card max-w-md w-full p-10 text-center">
            <i class="fa-solid fa-triangle-exclamation text-6xl text-teal-500 mb-6"></i>
            <p id="errorText" class="text-xl leading-relaxed mb-8"></p>
            <button onclick="hideError()" class="w-full py-5 bg-zinc-900 hover:bg-zinc-800 rounded-3xl text-lg font-medium transition">
                CLOSE
            </button>
        </div>
    </div>

    <script>
        const API_KEY = "33990be289mshc6f00878fdf6e7dp1b1374jsn04f139efbd1d";

        function showSearchPage() {
            document.getElementById('playerPage').classList.add('hidden');
            document.getElementById('searchPage').classList.remove('hidden');
        }

        function showPlayerPage() {
            document.getElementById('searchPage').classList.add('hidden');
            document.getElementById('playerPage').classList.remove('hidden');
        }

        function showLoading() { document.getElementById('loading').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
        function showError(msg) {
            document.getElementById('errorText').innerHTML = msg;
            document.getElementById('errorModal').classList.remove('hidden');
            hideLoading();
        }
        function hideError() { document.getElementById('errorModal').classList.add('hidden'); }

        async function searchPlayer() {
            let id = document.getElementById('playerInput').value.trim().replace(/\s/g, '');
            if (!id) return alert("Please enter an Epic Account ID");
            if (!/^[0-9a-fA-F]{32}$/.test(id)) {
                showError("Invalid format.<br>Must be exactly 32 hexadecimal characters.");
                return;
            }

            showLoading();

            const url = `https://rocket-league1.p.rapidapi.com/ranks/${id}`;

            try {
                const res = await fetch(url, {
                    headers: {
                        'X-RapidAPI-Key': API_KEY,
                        'X-RapidAPI-Host': 'rocket-league1.p.rapidapi.com',
                        'Accept-Encoding': 'identity',
                        'x-rapidapi-ua': 'RapidAPI-Playground'
                    }
                });

                if (!res.ok) {
                    if (res.status === 404) showError("Player not found.<br>Check the Epic ID.");
                    else if (res.status === 429) showError("Rate limit reached.<br>Try again later.");
                    else showError(`Error ${res.status}`);
                    return;
                }

                const data = await res.json();
                window.currentData = data;
                renderProfile(data, id);

                const statsToFetch = ['assists', 'goals', 'mvps', 'saves', 'shots', 'wins'];
                const statsData = {};

                await Promise.all(statsToFetch.map(async stat => {
                    try {
                        const statRes = await fetch(`https://rocket-league1.p.rapidapi.com/stat/${id}/${stat}`, {
                            headers: {
                                'X-RapidAPI-Key': API_KEY,
                                'X-RapidAPI-Host': 'rocket-league1.p.rapidapi.com',
                                'Accept-Encoding': 'identity',
                                'x-rapidapi-ua': 'RapidAPI-Playground'
                            }
                        });
                        if (statRes.ok) {
                            const json = await statRes.json();
                            statsData[stat] = json.value !== undefined ? json.value : json;
                        } else {
                            statsData[stat] = '—';
                        }
                    } catch {
                        statsData[stat] = '—';
                    }
                }));

                renderStats(statsData);

                showPlayerPage();

            } catch (err) {
                showError("Failed to connect.<br>Try again later.");
            } finally {
                hideLoading();
            }
        }

        function getRankClass(rankName) {
            rankName = rankName.toLowerCase();
            if (rankName.includes('bronze')) return 'rank-bronze';
            if (rankName.includes('silver')) return 'rank-silver';
            if (rankName.includes('gold')) return 'rank-gold';
            if (rankName.includes('platinum')) return 'rank-platinum';
            if (rankName.includes('diamond')) return 'rank-diamond';
            if (rankName.includes('champion')) return 'rank-champion';
            if (rankName.includes('grand champion')) return 'rank-grand';
            if (rankName.includes('supersonic legend')) return 'rank-legend';
            return 'rank-default';
        }

        function renderProfile(data, id) {
            const header = document.getElementById('playerHeader');
            const grid = document.getElementById('ranksGrid');
            const raw = document.getElementById('rawJson');
            raw.textContent = JSON.stringify(data, null, 2);

            let name = data.name || data.displayName || data.username || "Player";
            if (name.length > 24) name = name.slice(0, 21) + "...";

            header.innerHTML = `
                <div class="w-32 h-32 bg-gradient-to-br from-blue-600 to-indigo-800 rounded-3xl flex items-center justify-center text-8xl shadow-2xl flex-shrink-0">
                    🚀
                </div>
                <div class="text-center md:text-left w-full min-w-0">
                    <div class="text-5xl md:text-7xl font-black tracking-tight bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-600 bg-clip-text text-transparent break-words">${name}</div>
                    <div class="mt-4 flex flex-wrap items-center gap-4 justify-center md:justify-start">
                        <span class="px-6 py-2 bg-blue-950/60 text-blue-300 font-mono rounded-2xl text-sm whitespace-nowrap">EPIC ID</span>
                        <span class="text-blue-400/70 font-mono text-sm break-all">${id}</span>
                    </div>
                </div>
            `;

            grid.innerHTML = '';

            let playlists = {};
            if (data && typeof data === 'object') {
                Object.keys(data).forEach(k => {
                    const v = data[k];
                    if (v && typeof v === 'object' && (v.mmr || v.rank || v.tier)) {
                        playlists[k] = v;
                    }
                });
                if (Object.keys(playlists).length === 0 && data.ranks) playlists = data.ranks;
            }

            if (Object.keys(playlists).length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-blue-400/50 text-2xl">No rank data available</div>`;
                return;
            }

            const icons = {
                "bronze": "https://static.wikia.nocookie.net/rocketleague/images/6/6c/Bronze1_rank_icon.png",
                "silver": "https://static.wikia.nocookie.net/rocketleague/images/2/2f/Silver1_rank_icon.png",
                "gold": "https://static.wikia.nocookie.net/rocketleague/images/0/0e/Gold1_rank_icon.png",
                "platinum": "https://static.wikia.nocookie.net/rocketleague/images/4/4d/Platinum1_rank_icon.png",
                "diamond": "https://static.wikia.nocookie.net/rocketleague/images/9/9b/Diamond1_rank_icon.png",
                "champion": "https://static.wikia.nocookie.net/rocketleague/images/5/5e/Champion1_rank_icon.png",
                "grand champion": "https://static.wikia.nocookie.net/rocketleague/images/0/0d/GrandChampion1_rank_icon.png",
                "supersonic legend": "https://static.wikia.nocookie.net/rocketleague/images/0/0a/SupersonicLegend_rank_icon.png",
                "unranked": "https://via.placeholder.com/90x90/222/aaa?text=?"
            };

            Object.entries(playlists).forEach(([key, stats]) => {
                const title = key
                    .replace(/([A-Z])/g, ' $1')
                    .replace(/^./, s => s.toUpperCase())
                    .replace('Duel', '1v1')
                    .replace('Doubles', '2v2')
                    .replace('Standard', '3v3');

                let rank = (stats.rank || stats.tier_name || stats.tier || 'Unranked').toLowerCase();
                let div = stats.division !== undefined ? `Div ${stats.division}` : '';
                let mmr = stats.mmr || stats.skill || stats.rating || '—';
                let games = stats.matchesPlayed || stats.games || '—';
                let streak = stats.winStreak || stats.streak || '—';

                let icon = icons.unranked;
                for (let k in icons) {
                    if (rank.includes(k)) {
                        icon = icons[k];
                        break;
                    }
                }

                const themeClass = getRankClass(rank);

                const card = `
                    <div class="rank-card ${themeClass} p-8 md:p-10">
                        <div class="flex flex-col sm:flex-row items-center sm:items-start gap-6 md:gap-8">
                            <img src="${icon}" alt="${rank}" class="rank-icon flex-shrink-0">
                            <div class="flex-1 text-center sm:text-left min-w-0">
                                <div class="text-xs md:text-sm uppercase tracking-widest opacity-90 mb-1 md:mb-2">${title}</div>
                                <div class="text-3xl md:text-4xl lg:text-5xl font-black break-words leading-tight">${rank.charAt(0).toUpperCase() + rank.slice(1)}</div>
                                ${div ? `<div class="text-xl md:text-2xl opacity-90 mt-1">${div}</div>` : ''}
                            </div>
                            <div class="text-center sm:text-right mt-4 sm:mt-0 min-w-[120px]">
                                <div class="text-5xl md:text-6xl lg:text-7xl font-mono font-black">${mmr}</div>
                                <div class="text-xs md:text-sm opacity-70 tracking-wider">MMR</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-5 md:gap-6 mt-8">
                            <div class="bg-black/30 rounded-2xl p-5 md:p-6 text-center">
                                <div class="text-xs md:text-sm opacity-80 mb-1">GAMES</div>
                                <div class="text-3xl md:text-4xl font-mono">${games}</div>
                            </div>
                            <div class="bg-black/30 rounded-2xl p-5 md:p-6 text-center">
                                <div class="text-xs md:text-sm opacity-80 mb-1">STREAK</div>
                                <div class="text-3xl md:text-4xl font-mono flex justify-center items-center gap-2">
                                    ${streak} ${streak > 0 ? '<span class="text-green-300">🔥</span>' : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function renderStats(stats) {
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = '';

            const statDisplay = [
                { key: 'goals', label: 'Goals', icon: 'fa-futbol' },
                { key: 'assists', label: 'Assists', icon: 'fa-handshake' },
                { key: 'saves', label: 'Saves', icon: 'fa-shield-alt' },
                { key: 'shots', label: 'Shots', icon: 'fa-bullseye' },
                { key: 'mvps', label: 'MVPs', icon: 'fa-trophy' },
                { key: 'wins', label: 'Wins', icon: 'fa-check-circle' }
            ];

            statDisplay.forEach(item => {
                const value = stats[item.key] !== undefined && stats[item.key] !== null ? stats[item.key] : '—';
                const card = `
                    <div class="main-card p-8 text-center transform hover:scale-105 transition-all">
                        <i class="fa-solid ${item.icon} text-6xl text-blue-400 mb-4"></i>
                        <div class="text-4xl md:text-5xl font-black text-white">${value}</div>
                        <div class="text-xl md:text-2xl text-blue-300 mt-2">${item.label}</div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        document.getElementById('playerInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchPlayer();
        });
    </script>
</body>
</html>
