<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Ranks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        body {
            background: linear-gradient(135deg, #0f000a, #080013);
            color: #f3e8ff;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            position: relative;
        }
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }
        .main-card {
            background: rgba(18, 5, 25, 0.82);
            border: 1px solid rgba(216, 94, 254, 0.18);
            border-radius: 1.25rem;
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 1;
        }
        .rank-card {
            border-radius: 1.25rem;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1, 0.3, 1);
            border: 1px solid transparent;
            position: relative;
            z-index: 1;
        }
        .rank-card:hover {
            transform: translateY(-8px) scale(1.015);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
        }
        .rank-icon {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.7));
            transition: transform 0.35s ease;
        }
        .rank-card:hover .rank-icon { transform: scale(1.12); }
        .input-focus {
            transition: all 0.35s ease;
        }
        .input-focus:focus {
            border-color: #c084fc;
            box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.2);
            transform: scale(1.01);
            background: rgba(0,0,0,0.6) !important;
        }
        .pulse-glow {
            animation: pulse 5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.94; }
            50% { opacity: 1; }
        }
        .rank-bronze { background: linear-gradient(135deg, #2c0f14, #4a1a22); border-color: #9f1239; }
        .rank-silver { background: linear-gradient(135deg, #2a1a2e, #4a2c52); border-color: #a78bfa; }
        .rank-gold { background: linear-gradient(135deg, #3b1f0f, #6b3a1f); border-color: #fbbf24; }
        .rank-platinum { background: linear-gradient(135deg, #2a1f3b, #4a3b5e); border-color: #c4b5fd; }
        .rank-diamond { background: linear-gradient(135deg, #3b1a4a, #7c3aed); border-color: #a78bfa; }
        .rank-champion { background: linear-gradient(135deg, #4c1d95, #8b5cf6); border-color: #c084fc; }
        .rank-grand { background: linear-gradient(135deg, #3b0764, #7e22ce); border-color: #a855f7; }
        .rank-legend { background: linear-gradient(135deg, #2e0a4a, #6d28d9); border-color: #c084fc; box-shadow: 0 0 32px rgba(168,85,247,0.18); }
        .rank-default { background: linear-gradient(135deg, #0f001a, #1a0033); border-color: #6b21a8; }
        .purple-red-btn {
            position: relative;
            background: linear-gradient(270deg, #7c3aed, #c084fc, #ec4899, #a855f7, #7c3aed);
            background-size: 300% 300%;
            animation: gradientFlow 8s ease infinite;
            border: none;
            overflow: hidden;
            z-index: 1;
        }
        .purple-red-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(270deg, #4c1d95, #7c3aed, #a855f7, #7c3aed, #4c1d95);
            background-size: 300% 300%;
            animation: gradientFlow 8s ease infinite;
            z-index: -2;
            border-radius: 1rem;
            filter: brightness(0.6) saturate(0.85);
            opacity: 0.9;
        }
        .purple-red-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(18, 5, 25, 0.82);
            border-radius: 0.875rem;
            z-index: -1;
        }
        .purple-red-btn:hover {
            filter: brightness(1.1);
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .title-container {
            position: relative;
            display: inline-block;
            perspective: 1000px;
            padding-bottom: 2rem;
            overflow: visible !important;
            z-index: 1;
        }
        .title-text {
            display: block;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: center bottom;
            will-change: transform;
            background: linear-gradient(
                90deg,
                #a78bfa,
                #c084fc,
                #f472b6,
                #ec4899,
                #c084fc,
                #a78bfa
            );
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: gradientFlowTitle 7s ease infinite;
            transform: perspective(1000px) rotateX(var(--rotate-x, 0deg)) rotateY(var(--rotate-y, 0deg)) skew(var(--skew-x, 0deg), var(--skew-y, 0deg));
            line-height: 1.2;
            padding-bottom: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .title-container:hover .title-text {
            animation-duration: 5s;
            transform: perspective(1000px) rotateX(var(--rotate-x, 0deg)) rotateY(var(--rotate-y, 0deg)) skew(var(--skew-x, 0deg), var(--skew-y, 0deg)) scale(1.04);
        }
        @keyframes gradientFlowTitle {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #toastContainer {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 9999;
            max-width: 22rem;
        }
        .toast {
            background: rgba(30, 10, 50, 0.95);
            border: 1px solid;
            border-radius: 1rem;
            padding: 1rem 1.25rem;
            color: #f3e8ff;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.6, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.95rem;
        }
        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }
        .toast.error {
            border-color: #f87171;
            color: #fee2e2;
        }
        .toast-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="flex flex-col">
    <div id="particles-js"></div>

    <div id="searchPage" class="flex-1 flex flex-col items-center justify-center px-4 py-8 relative z-10">
        <div class="text-center mb-10 pulse-glow">
            <div class="title-container">
                <h1 class="title-text text-6xl md:text-7xl font-black tracking-tighter">
                    RL Ranks
                </h1>
            </div>
            <p class="mt-2 text-base md:text-lg text-purple-300/80 font-light">
                Rocket League ranks — fast and clean.
            </p>
        </div>
        <div class="w-full max-w-lg main-card p-6 md:p-8 shadow-lg">
            <input
                id="playerInput"
                type="text"
                placeholder="Enter Epic Account ID (32 hex chars)"
                class="w-full bg-black/60 border-2 border-purple-900/50 rounded-2xl px-5 py-4 text-lg placeholder-purple-400/60 outline-none input-focus text-center font-mono text-purple-100"
            >
            <button
                onclick="searchPlayer()"
                class="mt-6 w-full purple-red-btn py-5 rounded-2xl text-lg font-bold flex items-center justify-center gap-3 transition-all active:scale-95 shadow-lg"
            >
                <i class="fa-solid fa-rocket"></i>
                LOAD RANKS
            </button>
        </div>
        <div class="mt-8 text-xs md:text-sm text-purple-400/60 text-center">
            Use a 32-character Epic Account ID.
        </div>
    </div>

    <div id="playerPage" class="hidden relative z-10">
        <div class="max-w-5xl mx-auto px-5 pt-8 pb-12">
            <button
                onclick="showSearchPage()"
                class="mb-8 flex items-center gap-3 text-purple-300 hover:text-white text-base transition hover:scale-105 purple-red-btn px-5 py-2 rounded-xl text-sm font-medium"
            >
                <i class="fa-solid fa-arrow-left-long"></i>
                Back
            </button>
            <div id="playerHeader" class="main-card p-7 md:p-9 mb-12 flex flex-col md:flex-row items-center gap-7"></div>
            <h2 class="text-3xl md:text-4xl font-black mb-6 text-center md:text-left bg-gradient-to-r from-purple-400 to-fuchsia-500 bg-clip-text text-transparent">
                Current Ranks
            </h2>
            <div id="ranksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-7"></div>
            <details class="mt-14 main-card p-7 text-sm">
                <summary class="cursor-pointer flex items-center gap-3 text-purple-300 font-medium text-base">
                    <i class="fa-solid fa-code"></i>
                    Raw JSON Response
                </summary>
                <pre id="rawJson" class="mt-5 bg-black/70 p-5 rounded-xl overflow-auto max-h-96 text-gray-200 font-mono text-xs whitespace-pre-wrap"></pre>
            </details>
        </div>
    </div>

    <div id="loading" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="w-16 h-16 border-6 border-purple-500 border-t-transparent rounded-full animate-spin mx-auto mb-5"></div>
            <p class="text-xl font-bold text-purple-400">Loading ranks...</p>
        </div>
    </div>

    <div id="errorModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 px-4">
        <div class="main-card max-w-md w-full p-8 text-center">
            <i class="fa-solid fa-triangle-exclamation text-5xl text-fuchsia-500 mb-5"></i>
            <p id="errorText" class="text-lg leading-relaxed mb-6"></p>
            <button onclick="hideError()" class="w-full py-4 bg-zinc-900 hover:bg-zinc-800 rounded-2xl text-base font-medium transition purple-red-btn">
                CLOSE
            </button>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#888888" },
                "shape": { "type": "circle", "stroke": { "width": 0, "color": "#000000" } },
                "opacity": { "value": 0.35, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 3, "random": true, "anim": { "enable": false, "speed": 40, "size_min": 0.1, "sync": false } },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 0.8, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false, "attract": { "enable": false, "rotateX": 600, "rotateY": 1200 } }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": false }, "onclick": { "enable": false }, "resize": true }
            },
            "retina_detect": true
        });

        const API_KEY = "33990be289mshc6f00878fdf6e7dp1b1374jsn04f139efbd1d";

        function showSearchPage() {
            document.getElementById('playerPage').classList.add('hidden');
            document.getElementById('searchPage').classList.remove('hidden');
        }

        function showPlayerPage() {
            document.getElementById('searchPage').classList.add('hidden');
            document.getElementById('playerPage').classList.remove('hidden');
        }

        function showLoading() { document.getElementById('loading').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

        function showError(msg) {
            document.getElementById('errorText').innerHTML = msg;
            document.getElementById('errorModal').classList.remove('hidden');
            hideLoading();
        }

        function hideError() { document.getElementById('errorModal').classList.add('hidden'); }

        function showNotification(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type} flex`;
            let icon = 'fa-triangle-exclamation';
            let prefix = 'Error: ';
            if (type === 'success') {
                icon = 'fa-circle-check';
                prefix = 'Success: ';
            }
            toast.innerHTML = `
                <i class="fa-solid ${icon} toast-icon"></i>
                <span>${prefix}${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 5000);
        }

        async function searchPlayer() {
            let id = document.getElementById('playerInput').value.trim().replace(/\s/g, '');
            if (!id) {
                showNotification("Please enter an Epic Account ID", "error");
                return;
            }
            if (!/^[0-9a-fA-F]{32}$/.test(id)) {
                showNotification("Invalid format.<br>Must be exactly 32 hexadecimal characters.", "error");
                return;
            }

            showLoading();

            try {
                const ranksUrl = `https://rocket-league1.p.rapidapi.com/ranks/${id}`;
                const ranksRes = await fetch(ranksUrl, {
                    headers: {
                        'X-RapidAPI-Key': API_KEY,
                        'X-RapidAPI-Host': 'rocket-league1.p.rapidapi.com',
                        'Accept-Encoding': 'identity',
                        'x-rapidapi-ua': 'RapidAPI-Playground'
                    }
                });

                if (!ranksRes.ok) {
                    if (ranksRes.status === 404) showNotification("Player not found.<br>Check the Epic ID.", "error");
                    else if (ranksRes.status === 429) showNotification("Rate limit reached.<br>Try again later.", "error");
                    else showNotification(`Error ${ranksRes.status}`, "error");
                    hideLoading();
                    return;
                }

                const data = await ranksRes.json();
                window.currentData = data;

                const playerName = data.name || data.displayName || data.username || "Player";

                renderProfile(data, id, playerName);
                showPlayerPage();
            } catch (err) {
                showNotification("Failed to connect.<br>Try again later.", "error");
            } finally {
                hideLoading();
            }
        }

        function getRankClass(rankName) {
            rankName = rankName.toLowerCase();
            if (rankName.includes('bronze')) return 'rank-bronze';
            if (rankName.includes('silver')) return 'rank-silver';
            if (rankName.includes('gold')) return 'rank-gold';
            if (rankName.includes('platinum')) return 'rank-platinum';
            if (rankName.includes('diamond')) return 'rank-diamond';
            if (rankName.includes('champion')) return 'rank-champion';
            if (rankName.includes('grand champion')) return 'rank-grand';
            if (rankName.includes('supersonic legend')) return 'rank-legend';
            return 'rank-default';
        }

        function renderProfile(data, id, forcedName = null) {
            const header = document.getElementById('playerHeader');
            const grid = document.getElementById('ranksGrid');
            const raw = document.getElementById('rawJson');
            raw.textContent = JSON.stringify(data, null, 2);

            let name = forcedName || data.name || data.displayName || data.username || "Player";

            header.innerHTML = `
                <div class="w-28 h-28 bg-gradient-to-br from-purple-700 to-fuchsia-800 rounded-2xl flex items-center justify-center text-6xl shadow-xl flex-shrink-0">
                    🚀
                </div>
                <div class="text-center md:text-left w-full min-w-0">
                    <div class="text-4xl md:text-5xl font-black tracking-tight bg-gradient-to-r from-purple-400 via-fuchsia-500 to-pink-500 bg-clip-text text-transparent break-words">
                        ${name}
                    </div>
                    <div class="mt-3 flex flex-wrap items-center gap-3 justify-center md:justify-start">
                        <span class="px-4 py-1.5 bg-purple-950/60 text-purple-300 font-mono rounded-xl text-xs whitespace-nowrap">EPIC ID</span>
                        <span class="text-purple-400/70 font-mono text-xs break-all">${id}</span>
                    </div>
                </div>
            `;

            grid.innerHTML = '';

            let playlists = {};
            if (data && typeof data === 'object') {
                Object.keys(data).forEach(k => {
                    const v = data[k];
                    if (v && typeof v === 'object' && (v.mmr || v.rank || v.tier)) {
                        playlists[k] = v;
                    }
                });
                if (Object.keys(playlists).length === 0 && data.ranks) playlists = data.ranks;
            }

            if (Object.keys(playlists).length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-16 text-purple-400/50 text-xl">No rank data available</div>`;
                return;
            }

            const tierOffsets = {
                "unranked": 0,
                "bronze": 1,
                "silver": 4,
                "gold": 7,
                "platinum": 10,
                "diamond": 13,
                "champion": 16,
                "grand champion": 19,
                "supersonic legend": 22
            };

            Object.entries(playlists).forEach(([key, stats]) => {
                const title = key
                    .replace(/([A-Z])/g, ' $1')
                    .replace(/^./, s => s.toUpperCase())
                    .replace('Duel', '1v1')
                    .replace('Doubles', '2v2')
                    .replace('Standard', '3v3');

                let rankLower = (stats.rank || stats.tier_name || stats.tier || 'Unranked').toLowerCase();
                let division = stats.division || stats.div || 1;
                if (division > 4) division = 4;
                if (division < 1) division = 1;

                let mmr = stats.mmr || stats.skill || stats.rating || '—';
                let games = stats.matchesPlayed || stats.games || '—';
                let streak = stats.winStreak || stats.streak || '—';

                let baseNum = tierOffsets.unranked;
                for (let t in tierOffsets) {
                    if (rankLower.includes(t)) {
                        baseNum = tierOffsets[t];
                        break;
                    }
                }

                let imgNum = baseNum + (division - 1);
                let icon = `https://trackercdn.com/cdn/tracker.gg/rocket-league/ranks/s4-${imgNum}.png`;
                const fallbackIcon = 'https://trackercdn.com/cdn/tracker.gg/rocket-league/ranks/s4-0.png';

                const themeClass = getRankClass(rankLower);
                const divText = division ? `Div ${division}` : '';

                const card = `
                    <div class="rank-card ${themeClass} p-6 md:p-7">
                        <div class="flex flex-col sm:flex-row items-center sm:items-start gap-5">
                            <img
                                src="${icon}"
                                alt="${rankLower}"
                                class="rank-icon flex-shrink-0"
                                onerror="this.onerror=null; this.src='${fallbackIcon}';"
                            >
                            <div class="flex-1 text-center sm:text-left min-w-0">
                                <div class="text-xs uppercase tracking-widest opacity-90 mb-1">${title}</div>
                                <div class="text-2xl md:text-3xl font-black whitespace-nowrap overflow-hidden text-ellipsis max-w-full leading-tight">
                                    ${rankLower.charAt(0).toUpperCase() + rankLower.slice(1)}
                                </div>
                                ${divText ? `<div class="text-lg opacity-90 mt-1">${divText}</div>` : ''}
                            </div>
                            <div class="text-center sm:text-right mt-3 sm:mt-0 min-w-[100px]">
                                <div class="text-4xl md:text-5xl font-mono font-black">${mmr}</div>
                                <div class="text-xs opacity-70 tracking-wider">MMR</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-6">
                            <div class="bg-black/35 rounded-xl p-4 text-center">
                                <div class="text-xs opacity-80 mb-1">GAMES</div>
                                <div class="text-2xl font-mono">${games}</div>
                            </div>
                            <div class="bg-black/35 rounded-xl p-4 text-center">
                                <div class="text-xs opacity-80 mb-1">STREAK</div>
                                <div class="text-2xl font-mono flex justify-center items-center gap-2">
                                    ${streak} ${streak > 0 ? '<span class="text-pink-300">🔥</span>' : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const titleContainer = document.querySelector('.title-container');
            const titleText = document.querySelector('.title-text');
            if (!titleContainer || !titleText) return;

            titleContainer.addEventListener('mousemove', (e) => {
                const rect = titleContainer.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width / 2) / (rect.width / 2);
                const y = (e.clientY - rect.top - rect.height / 2) / (rect.height / 2);
                const skewX = x * 8 + 'deg';
                const skewY = -y * 4 + 'deg';
                const rotateY = x * 10 + 'deg';
                const rotateX = -y * 8 + 'deg';
                titleText.style.setProperty('--skew-x', skewX);
                titleText.style.setProperty('--skew-y', skewY);
                titleText.style.setProperty('--rotate-x', rotateX);
                titleText.style.setProperty('--rotate-y', rotateY);
            });

            titleContainer.addEventListener('mouseleave', () => {
                titleText.style.setProperty('--skew-x', '0deg');
                titleText.style.setProperty('--skew-y', '0deg');
                titleText.style.setProperty('--rotate-x', '0deg');
                titleText.style.setProperty('--rotate-y', '0deg');
            });
        });

        document.getElementById('playerInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchPlayer();
        });
    </script>
</body>
</html>
