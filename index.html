<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aerial Analytics – Rocket League Stats</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #141b2e;
      --accent: #00eaff;
      --accent-dark: #00b7d4;
      --text: #e0faff;
      --border: #00eaff33;
      --error: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      width: 100%;
      background: linear-gradient(135deg, #0b1f38, #00141f);
      box-shadow: 0 6px 25px rgba(0,0,0,0.7);
    }
    h1 {
      font-size: 3.2rem;
      background: linear-gradient(90deg, var(--accent), #ff00d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.4rem;
    }
    .subtitle { opacity: 0.8; font-size: 1.1rem; }
    .search-box {
      margin: 2rem 0;
      display: flex;
      width: 100%;
      max-width: 520px;
      gap: 0.8rem;
    }
    input {
      flex: 1;
      padding: 1rem 1.6rem;
      font-size: 1.15rem;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: white;
      outline: none;
      transition: all 0.25s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(0,234,255,0.35);
    }
    button {
      padding: 0 2.2rem;
      font-size: 1.15rem;
      font-weight: 600;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.25s;
    }
    button:hover { background: var(--accent-dark); transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    #result {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border-radius: 16px;
      padding: 2rem;
      border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(0,234,255,0.12);
      margin-top: 1rem;
      min-height: 200px;
    }
    .loading, .error { text-align: center; padding: 2rem; font-size: 1.2rem; }
    .error { color: var(--error); }
    .player-name {
      text-align: center;
      font-size: 2.1rem;
      margin-bottom: 0.6rem;
      color: var(--accent);
    }
    .overview {
      text-align: center;
      opacity: 0.9;
      margin-bottom: 1.8rem;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.4rem;
    }
    .stat-item {
      background: rgba(0,234,255,0.07);
      padding: 1.3rem 1rem;
      border-radius: 12px;
      text-align: center;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .stat-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(0,234,255,0.18);
    }
    .stat-label { font-size: 0.95rem; opacity: 0.85; margin-bottom: 0.5rem; }
    .stat-value { font-size: 2.1rem; font-weight: bold; color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <h1>Aerial Analytics</h1>
    <div class="subtitle">Rocket League Player Statistics</div>
  </header>

  <div class="search-box">
    <input type="text" id="username" placeholder="Epic username (e.g. Dustie_Divine)" />
    <button onclick="getStats()">Search</button>
  </div>

  <div id="result"></div>

  <script>
    const CORS_PROXY = "https://corsproxy.io/?";
    const BASE_URL = "https://api.tracker.gg/api/v2/rocket-league/standard/profile/epic/";

    async function getStats() {
      const input = document.getElementById("username");
      const username = input.value.trim();
      if (!username) {
        alert("Please enter an Epic username");
        return;
      }

      const result = document.getElementById("result");
      result.innerHTML = '<div class="loading">Fetching stats...</div>';

      try {
        const targetUrl = BASE_URL + encodeURIComponent(username);
        const proxyUrl = CORS_PROXY + encodeURIComponent(targetUrl);

        const response = await fetch(proxyUrl, {
          headers: {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }
        });

        if (!response.ok) {
          throw new Error(`Tracker responded with ${response.status} — may be rate limited or blocked`);
        }

        const json = await response.json();

        if (json.errors && json.errors.length > 0) {
          throw new Error(json.errors[0].message || "API error");
        }

        const data = json.data;
        if (!data) throw new Error("No profile data found");

        const platform = data.platformInfo?.platformUserHandle || username;
        const segments = data.segments || [];
        const overview = segments.find(s => s.type === "overview")?.stats || {};

        let html = `
          <div class="player-name">${platform}</div>
          <div class="overview">
            Collected Matches: ${overview.matchesPlayed?.value?.toLocaleString() || "—"}
          </div>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-label">MMR Rating</div>
              <div class="stat-value">${overview.rating?.value?.toLocaleString() || "—"}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Wins</div>
              <div class="stat-value">${overview.wins?.value?.toLocaleString() || "—"}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Goals</div>
              <div class="stat-value">${overview.goals?.value?.toLocaleString() || "—"}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Assists</div>
              <div class="stat-value">${overview.assists?.value?.toLocaleString() || "—"}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Saves</div>
              <div class="stat-value">${overview.saves?.value?.toLocaleString() || "—"}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">MVPs</div>
              <div class="stat-value">${overview.mVPs?.value?.toLocaleString() || "—"}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Shots</div>
              <div class="stat-value">${overview.shots?.value?.toLocaleString() || "—"}</div>
            </div>
          </div>
        `;

        // Bonus: show some playlist ranks if available
        const playlists = segments.filter(s => s.type === "playlist");
        if (playlists.length > 0) {
          html += `<h3 style="margin: 2rem 0 1rem; text-align:center;">Playlists</h3><div class="stats-grid">`;
          playlists.forEach(p => {
            const tier = p.stats?.tier?.metadata?.name || "—";
            const div = p.stats?.rating?.value || "—";
            html += `
              <div class="stat-item">
                <div class="stat-label">${p.metadata?.name || "Unknown"}</div>
                <div class="stat-value">${div}</div>
                <div style="font-size:0.9rem; opacity:0.8;">${tier}</div>
              </div>`;
          });
          html += `</div>`;
        }

        result.innerHTML = html;
      } catch (err) {
        result.innerHTML = `<div class="error">Error: ${err.message}<br><br>Try again later — the unofficial endpoint may be restricted.</div>`;
        console.error(err);
      }
    }

    // Optional: search on Enter key
    document.getElementById("username").addEventListener("keypress", e => {
      if (e.key === "Enter") getStats();
    });
  </script>

</body>
</html>
