<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLStats - Sign in with Epic Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root { --epic-blue: #0E9FFF; }
        
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            width: 440px;
            padding: 40px 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        h1 { text-align: center; font-size: 28px; font-weight: 600; margin: 0; }
        
        p.subtitle { text-align: center; color: #aaa; margin-bottom: 40px; font-size: 15px; }
        
        .form-group { margin-bottom: 20px; }
        
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #ccc; }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        
        input:focus { outline: none; border-color: var(--epic-blue); box-shadow: 0 0 0 3px rgba(14, 159, 255, 0.2); }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--epic-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-btn:hover { background: #0b8be6; }
        
        .divider { margin: 30px 0; text-align: center; color: #666; font-size: 14px; position: relative; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.1); }
        .divider span { background: rgba(255,255,255,0.08); padding: 0 20px; }
        
        .epic-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
        }
        
        .epic-btn:hover { background: rgba(255,255,255,0.12); }
        
        .status { margin-top: 24px; padding: 12px; border-radius: 12px; font-size: 14px; text-align: center; display: none; }
        .success { background: rgba(0, 255, 100, 0.15); color: #0f0; }
        .error { background: rgba(255, 80, 80, 0.15); color: #ff5555; }
        
        .footer { text-align: center; margin-top: 32px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="white" width="48" height="48">
                <path d="M100 20 L180 60 L180 140 L100 180 L20 140 L20 60 Z" fill="#0E9FFF"/>
                <path d="M100 40 L160 70 L160 130 L100 160 L40 130 L40 70 Z" fill="#fff"/>
            </svg>
            <h1>Sign in with Epic</h1>
        </div>
        
        <p class="subtitle">RLStats Login • Powered by Epic Games</p>
        
        <button onclick="startOAuthFlow()" class="epic-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4V7m-4 4V7" />
            </svg>
            Continue with Epic Games
        </button>
        
        <div class="divider"><span>or (dev only)</span></div>
        
        <div id="direct-form">
            <div class="form-group">
                <label for="username">Email or Username</label>
                <input type="text" id="username" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button onclick="attemptDirectLogin()" class="login-btn">Sign in directly (dev only)</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="footer">
            Your Client ID and Redirect URI are already configured.<br>
            <strong>Only use the blue button on your real website.</strong>
        </div>
    </div>

    <script>
        // === YOUR REAL CREDENTIALS (already filled) ===
        const CLIENT_ID = "xyza7891Qj96f6zQofNHQ0ExVjK4zFCP";
        const REDIRECT_URI = "https://www.rlstats.goit.au";
        const DEPLOYMENT_ID = "d59d6baab8394c008f70c8f80abc3a6f";
        
        const AUTH_URL = "https://www.epicgames.com/id/authorize";
        
        function showStatus(message, type = "error") {
            const statusEl = document.getElementById("status");
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.style.display = "block";
            setTimeout(() => statusEl.style.display = "none", 8000);
        }
        
        // === RECOMMENDED & SECURE WAY ===
        function startOAuthFlow() {
            const state = btoa(Math.random().toString()).slice(0, 32);
            sessionStorage.setItem("oauth_state", state);
            
            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                response_type: "code",
                scope: "basic_profile friends_list",
                redirect_uri: REDIRECT_URI,
                state: state
            });
            
            window.location.href = `${AUTH_URL}?${params.toString()}`;
        }
        
        // === DIRECT PASSWORD (only for testing dev accounts) ===
        async function attemptDirectLogin() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            
            if (!username || !password) return showStatus("Enter username and password", "error");
            
            showStatus("Trying direct login...", "error");
            
            const formData = new URLSearchParams();
            formData.append("grant_type", "password");
            formData.append("username", username);
            formData.append("password", password);
            formData.append("scope", "basic_profile");
            formData.append("deployment_id", DEPLOYMENT_ID);
            
            try {
                const res = await fetch("https://api.epicgames.dev/epic/oauth/v2/token", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                        "Authorization": "Basic " + btoa(CLIENT_ID + ":")
                    },
                    body: formData
                });
                
                const data = await res.json();
                
                if (res.ok && data.access_token) {
                    showStatus(`✅ Logged in! Account ID: ${data.account_id || 'unknown'}`, "success");
                    console.log("Epic Token:", data.access_token);
                } else {
                    showStatus(data.error_description || "Login failed (2FA or not a dev account)", "error");
                }
            } catch (e) {
                showStatus("Network error: " + e.message, "error");
            }
        }
        
        // Check if Epic redirected back to us
        window.onload = () => {
            const params = new URLSearchParams(location.search);
            const code = params.get("code");
            const state = params.get("state");
            const error = params.get("error");
            
            if (error) showStatus("Epic error: " + error, "error");
            else if (code) {
                if (state === sessionStorage.getItem("oauth_state")) {
                    showStatus("✅ Authorization code received!\n\nIn production, send this code to your backend to get the access token.", "success");
                    console.log("🔑 Authorization Code:", code);
                } else {
                    showStatus("State mismatch!", "error");
                }
            }
        };
        
        console.log("%c✅ RLStats Epic Login ready with your real credentials!", "color:#0E9FFF; font-size:16px");
    </script>
</body>
</html>
